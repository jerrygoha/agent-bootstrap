model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
model_verbosity = "high"
plan_mode_reasoning_effort = "xhigh"
personality = "pragmatic"

[profiles.previous]
model = "gpt-5.4"

[agents.eng-lead]
description = "Primary lead for day-to-day work. Stay local by default and delegate only when it creates clear leverage."
config_file = "agents/eng-lead.toml"

[agents.orchestrator]
description = "Compatibility alias for eng-lead with the same local-first delegation rules."
config_file = "agents/eng-lead.toml"

[agents.planner]
description = "Use for design, decomposition, and implementation planning before code changes."
config_file = "agents/planner.toml"

[agents.researcher]
description = "Use for read-only exploration, repository archaeology, and broad context gathering."
config_file = "agents/researcher.toml"

[agents.debugger]
description = "Use for bug investigation, reproduction, evidence gathering, and root-cause analysis."
config_file = "agents/debugger.toml"

[agents.reviewer]
description = "Use for review-only work focused on bugs, regressions, missing tests, and operational risk."
config_file = "agents/reviewer.toml"

[agents.verifier]
description = "Use to gather objective evidence before claiming work is complete."
config_file = "agents/verifier.toml"

[agents.release-manager]
description = "Use for branch finishing, release readiness, and CI or merge gate evaluation."
config_file = "agents/release-manager.toml"

[agents.skill-author]
description = "Use to create or refine reusable skills and process automation."
config_file = "agents/skill-author.toml"

[agents.worker]
description = "General implementation fallback for routine code changes when no specialist is required."
config_file = "agents/worker.toml"

[agents.frontend-engineer]
description = "Use for UI behavior, state flow, accessibility, and frontend implementation."
config_file = "agents/frontend-engineer.toml"

[agents.backend-engineer]
description = "Use for APIs, domain logic, data integrity, and backend implementation."
config_file = "agents/backend-engineer.toml"

[agents.platform-engineer]
description = "Use for environment, deployment, build, runtime, and platform-level changes."
config_file = "agents/platform-engineer.toml"

[agents.data-engineer]
description = "Use for data pipelines, analytics transformations, migrations, and data quality work."
config_file = "agents/data-engineer.toml"

[agents.security-engineer]
description = "Use for auth, authz, secret handling, trust boundaries, and security-sensitive changes."
config_file = "agents/security-engineer.toml"

[agents.integrations-engineer]
description = "Use for external APIs, SDKs, webhooks, and third-party contract changes."
config_file = "agents/integrations-engineer.toml"

[agents.performance-engineer]
description = "Use for latency, throughput, query cost, memory use, and bottleneck reduction."
config_file = "agents/performance-engineer.toml"

[features]
multi_agent = true
